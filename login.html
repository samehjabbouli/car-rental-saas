<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarRental - نظام إدارة تأجير السيارات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-white to-slate-50">
  <div class="min-h-screen flex">
    <!-- Right Side - Form -->
    <div class="flex-1 flex items-center justify-center p-8">
      <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
          <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 mb-4 shadow-lg shadow-blue-600/25">
            <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
            </svg>
          </div>
          <h1 class="text-3xl font-bold text-slate-900">CarRental</h1>
          <p class="text-slate-500 mt-2">نظام إدارة تأجير السيارات</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="bg-white rounded-2xl border border-slate-200 shadow-xl shadow-slate-200/50 p-8">
          <h2 class="text-2xl font-bold text-slate-900 mb-2">تسجيل الدخول</h2>
          <p class="text-slate-500 mb-8">مرحباً بك مجدداً، أدخل بياناتك للمتابعة</p>
          
          <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl">
            <p class="text-red-600 text-sm text-center"></p>
          </div>

          <div class="space-y-2 mb-6">
            <label class="text-sm font-medium text-slate-700">البريد الإلكتروني</label>
            <input type="email" id="email" required
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all text-slate-900"
              placeholder="example@domain.com">
          </div>

          <div class="space-y-2 mb-6">
            <label class="text-sm font-medium text-slate-700">كلمة المرور</label>
            <input type="password" id="password" required
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all text-slate-900"
              placeholder="أدخل كلمة المرور">
          </div>

          <div class="flex justify-end mb-6">
            <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">نسيت كلمة المرور؟</a>
          </div>

          <button type="submit" id="submitBtn"
            class="w-full h-12 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold rounded-xl shadow-lg shadow-blue-600/25 hover:shadow-blue-600/40 transition-all duration-200">
            تسجيل الدخول
          </button>

          <div class="mt-8 text-center">
            <p class="text-slate-500">
              ليس لديك حساب؟
              <a href="register.html" class="text-blue-600 hover:text-blue-700 font-semibold">إنشاء حساب جديد</a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <!-- Left Side - Illustration -->
    <div class="hidden lg:flex flex-1 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 items-center justify-center p-12">
      <div class="max-w-md text-center text-white">
        <div class="mb-8">
          <svg class="w-32 h-32 mx-auto" viewBox="0 0 200 200" fill="none">
            <circle cx="100" cy="100" r="80" fill="white" fill-opacity="0.1"/>
            <circle cx="100" cy="100" r="60" fill="white" fill-opacity="0.1"/>
            <path d="M60 120 L80 100 L120 100 L140 120 L140 130 L60 130 Z" fill="white"/>
            <circle cx="75" cy="130" r="12" fill="white" fill-opacity="0.8"/>
            <circle cx="125" cy="130" r="12" fill="white" fill-opacity="0.8"/>
          </svg>
        </div>
        <h2 class="text-3xl font-bold mb-4">نظام متكامل لإدارة التأجير</h2>
        <p class="text-blue-100 text-lg leading-relaxed">
          إدارة الأسطول والحجوزات والعملاء والفواتير في منصة واحدة سهلة الاستخدام
        </p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dyesocyzpmyzxasmgxat.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5ZXNvY3l6cG15enhhc21neGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTE2ODgsImV4cCI6MjA5NDk4NzY4OH0.dYai4mJSAmuJL8It96eNVUxAGv25z8oQu0a2l-7Pnm8';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="flex items-center justify-center gap-2">جاري التحميل...</span>';
      errorDiv.classList.add('hidden');

      try {
        const response = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.error) {
          errorDiv.querySelector('p').textContent = data.error.message || 'خطأ في تسجيل الدخول';
          errorDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'تسجيل الدخول';
        } else {
          localStorage.setItem('sb-token', data.access_token);
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        errorDiv.querySelector('p').textContent = 'خطأ في الاتصال بالخادم';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
