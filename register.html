<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarRental - إنشاء حساب جديد</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-white to-slate-50">
  <div class="min-h-screen flex">
    <!-- Right Side - Form -->
    <div class="flex-1 flex items-center justify-center p-8">
      <div class="w-full max-w-lg">
        <!-- Logo -->
        <div class="text-center mb-10">
          <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 mb-4 shadow-lg shadow-blue-600/25">
            <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
            </svg>
          </div>
          <h1 class="text-3xl font-bold text-slate-900">CarRental</h1>
          <p class="text-slate-500 mt-2">إنشاء حساب جديد</p>
        </div>

        <!-- Register Form -->
        <form id="registerForm" class="bg-white rounded-2xl border border-slate-200 shadow-xl shadow-slate-200/50 p-8">
          <h2 class="text-xl font-bold text-slate-900 mb-6">معلومات الشركة</h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">اسم الشركة</label>
              <input type="text" id="company_name" required
                class="w-full h-11 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 transition-all text-slate-900"
                placeholder="اسم شركتك">
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">رقم الهاتف</label>
              <input type="tel" id="phone" required
                class="w-full h-11 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 transition-all text-slate-900"
                placeholder="05xxxxxxxx">
            </div>
          </div>

          <h2 class="text-xl font-bold text-slate-900 mb-6 pt-4 border-t">معلومات الحساب</h2>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">الاسم الكامل</label>
              <input type="text" id="full_name" required
                class="w-full h-11 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 transition-all text-slate-900"
                placeholder="الاسم الكامل">
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">البريد الإلكتروني</label>
              <input type="email" id="email" required
                class="w-full h-11 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 transition-all text-slate-900"
                placeholder="example@domain.com">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">كلمة المرور</label>
              <input type="password" id="password" required minlength="6"
                class="w-full h-11 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 transition-all text-slate-900"
                placeholder="6 أحرف على الأقل">
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">تأكيد كلمة المرور</label>
              <input type="password" id="confirm_password" required
                class="w-full h-11 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 transition-all text-slate-900"
                placeholder="أعد إدخال كلمة المرور">
            </div>
          </div>

          <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl">
            <p class="text-red-600 text-sm text-center"></p>
          </div>

          <div id="successMsg" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-xl">
            <p class="text-green-600 text-sm text-center">تم إنشاء الحساب بنجاح!</p>
          </div>

          <button type="submit" id="submitBtn"
            class="w-full h-12 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold rounded-xl shadow-lg shadow-blue-600/25">
            إنشاء الحساب
          </button>

          <div class="mt-6 text-center">
            <p class="text-slate-500">
              لديك حساب بالفعل؟
              <a href="login.html" class="text-blue-600 hover:text-blue-700 font-semibold">تسجيل الدخول</a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <!-- Left Side - Illustration -->
    <div class="hidden lg:flex flex-1 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 items-center justify-center p-12">
      <div class="max-w-md text-center text-white">
        <div class="mb-8">
          <svg class="w-32 h-32 mx-auto" viewBox="0 0 200 200" fill="none">
            <circle cx="100" cy="100" r="80" fill="white" fill-opacity="0.1"/>
            <circle cx="100" cy="100" r="60" fill="white" fill-opacity="0.1"/>
            <path d="M60 120 L80 100 L120 100 L140 120 L140 130 L60 130 Z" fill="white"/>
            <circle cx="75" cy="130" r="12" fill="white" fill-opacity="0.8"/>
            <circle cx="125" cy="130" r="12" fill="white" fill-opacity="0.8"/>
          </svg>
        </div>
        <h2 class="text-3xl font-bold mb-4">ابدأ الآن مجاناً</h2>
        <p class="text-blue-100 text-lg leading-relaxed">
          أنشئ حسابك وابدأ بإدارة شركة تأجير السيارات الخاصة بك
        </p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dyesocyzpmyzxasmgxat.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5ZXNvY3l6cG15enhhc21neGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTE2ODgsImV4cCI6MjA5NDk4NzY4OH0.dYai4mJSAmuJL8It96eNVUxAGv25z8oQu0a2l-7Pnm8';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      if (password !== confirmPassword) {
        errorDiv.querySelector('p').textContent = 'كلمتا المرور غير متطابقتين';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'جاري الإنشاء...';
      errorDiv.classList.add('hidden');

      const data = {
        email: document.getElementById('email').value,
        password: password,
        data: {
          full_name: document.getElementById('full_name').value,
          company_name: document.getElementById('company_name').value,
          phone: document.getElementById('phone').value
        }
      };

      try {
        const response = await fetch(SUPABASE_URL + '/auth/v1/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.error) {
          errorDiv.querySelector('p').textContent = result.error.message || 'خطأ في إنشاء الحساب';
          errorDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'إنشاء الحساب';
        } else {
          successDiv.classList.remove('hidden');
          btn.classList.add('hidden');
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      } catch (err) {
        errorDiv.querySelector('p').textContent = 'خطأ في الاتصال بالخادم';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'إنشاء الحساب';
      }
    });
  </script>
</body>
</html>
